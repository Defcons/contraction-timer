<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contraction Timer</title>
<style>
  :root {
    --bg: #14110f;
    --card: #1e1a17;
    --border: #2c2621;
    --border2: #241f1b;
    --text: #f0ece6;
    --muted: #8a827a;
    --subtle: #6b635b;
    --soft: #c9c1b8;
    --btn-start: #b5442f;
    --btn-stop: #8a2018;
    --go-bg: #3a1512; --go-border: #7a2820; --go-text: #ff9d8a;
    --soon-bg: #33270f; --soon-border: #6b5217; --soon-text: #f0c060;
    --ok: #6f9a6f;
    --warn: #b08a4f;
  }
  html[data-theme="light"] {
    --bg: #f7f1ea;
    --card: #fffdfa;
    --border: #e7dccd;
    --border2: #eee4d7;
    --text: #3d332b;
    --muted: #95877a;
    --subtle: #b3a596;
    --soft: #6b5d50;
    --btn-start: #c2503a;
    --btn-stop: #a03226;
    --go-bg: #fbe3dd; --go-border: #eeb3a6; --go-text: #a03a26;
    --soon-bg: #faf0d8; --soon-border: #e6cf96; --soon-text: #8a6d1f;
    --ok: #4c7d4c;
    --warn: #9a7433;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 40px;
    max-width: 560px;
    margin: 0 auto;
    transition: background 0.25s, color 0.25s;
  }
  .top { display: flex; align-items: flex-start; justify-content: space-between; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .themebtn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    padding: 7px 10px;
    cursor: pointer;
    line-height: 1;
  }

  .avgwin { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .avgwin label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .avgwin select {
    flex: 1; padding: 8px 10px; font-size: 13px;
    border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--soft);
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }
  .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 5px; }
  .stat .value { font-size: 22px; font-weight: 600; }
  .stat .value.small { font-size: 15px; font-weight: 500; }

  .status {
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 16px;
    font-size: 14px;
    font-weight: 500;
    background: var(--card);
    border: 1px solid var(--border);
  }
  .status.go { background: var(--go-bg); border-color: var(--go-border); color: var(--go-text); }
  .status.soon { background: var(--soon-bg); border-color: var(--soon-border); color: var(--soon-text); }

  .bigbtn {
    width: 100%;
    padding: 26px;
    font-size: 20px;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    color: #fff;
    cursor: pointer;
    transition: transform 0.08s, background 0.2s;
    margin-bottom: 12px;
  }
  .bigbtn:active { transform: scale(0.98); }
  .start { background: var(--btn-start); }
  .stop { background: var(--btn-stop); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.82; } }

  .running-timer { text-align: center; font-size: 40px; font-weight: 700; margin: 6px 0 14px; font-variant-numeric: tabular-nums; }
  .running-timer.hidden { display: none; }

  .secondary { display: flex; gap: 10px; margin-bottom: 22px; }
  .secondary button {
    flex: 1;
    padding: 12px;
    font-size: 13px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--soft);
    cursor: pointer;
  }
  .secondary button:active { background: var(--border); }

  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 10px; }
  .log { list-style: none; }
  .log li {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 10px;
    align-items: center;
    padding: 8px 4px;
    border-bottom: 1px solid var(--border2);
    font-size: 14px;
  }
  .log li .time { color: var(--soft); }
  .log li .dur { font-variant-numeric: tabular-nums; color: var(--text); }
  .log li .gap { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 12px; min-width: 52px; text-align: right; }
  .log li .note { grid-column: 1 / -1; font-size: 12px; color: var(--muted); font-style: italic; padding-bottom: 2px; margin-top: -4px; }
  .rowacts { display: flex; gap: 0; }
  .rowbtn {
    background: none;
    border: none;
    color: var(--subtle);
    font-size: 15px;
    padding: 8px 7px;
    cursor: pointer;
    line-height: 1;
  }
  .rowbtn:active { color: var(--text); }
  .empty { color: var(--subtle); font-size: 14px; padding: 8px 4px; }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 10; padding: 16px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%; max-width: 320px;
  }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 5px; }
  .field input {
    width: 100%; padding: 10px; font-size: 16px;
    border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text);
  }
  .modal .err { color: var(--go-text); font-size: 12px; margin-top: 2px; display: none; }
  .modal .btns { display: flex; gap: 10px; margin-top: 16px; }
  .modal .btns button {
    flex: 1; padding: 12px; font-size: 14px;
    border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--soft); cursor: pointer;
  }
  .modal .btns button.primary { background: var(--btn-start); border-color: transparent; color: #fff; font-weight: 600; }
  .saved-note { font-size: 11px; color: var(--subtle); text-align: center; margin-top: 18px; }
  .saved-note.ok { color: var(--ok); }
  .saved-note.warn { color: var(--warn); }
</style>
<script>document.documentElement.dataset.theme = (function(){ try { return localStorage.getItem('ctTheme') || 'dark'; } catch(e) { return 'dark'; } })();</script>
</head>
<body>
  <div class="top">
    <h1>Contraction Timer</h1>
    <div style="display:flex; gap:8px;">
      <a class="themebtn" href="baby/" title="Baby tracker" style="text-decoration:none; color:inherit; display:inline-flex; align-items:center;">🍼</a>
      <button class="themebtn" id="themeBtn" aria-label="Toggle light/dark">☀️</button>
    </div>
  </div>
  <div class="sub">Tap start when one begins, stop when it ends.</div>

  <div class="avgwin">
    <label for="avgWindowSel">Average over</label>
    <select id="avgWindowSel">
      <option value="5">Last 5</option>
      <option value="8">Last 8</option>
      <option value="10">Last 10</option>
      <option value="15m">Last 15 min</option>
      <option value="30m">Last 30 min</option>
      <option value="60m">Last 1 hour</option>
      <option value="120m">Last 2 hours</option>
    </select>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="label" id="avgFreqLabel">Avg frequency (last 5)</div>
      <div class="value" id="avgFreq">—</div>
    </div>
    <div class="stat">
      <div class="label" id="avgDurLabel">Avg duration (last 5)</div>
      <div class="value" id="avgDur">—</div>
    </div>
    <div class="stat">
      <div class="label">Last gap</div>
      <div class="value small" id="lastGap">—</div>
    </div>
    <div class="stat">
      <div class="label">Total logged</div>
      <div class="value" id="total">0</div>
    </div>
  </div>

  <div class="status" id="status">Waiting for first contraction</div>

  <div class="running-timer hidden" id="runningTimer">0:00</div>
  <button class="bigbtn start" id="mainBtn">Start contraction</button>

  <div class="secondary">
    <button id="undoBtn">Undo last</button>
    <button id="resetBtn">Reset all</button>
  </div>

  <h2>Log</h2>
  <ul class="log" id="logList">
    <li class="empty">No contractions yet.</li>
  </ul>

  <div class="saved-note" id="syncNote">Saved automatically to this device.</div>

  <div class="overlay" id="editOverlay">
    <div class="modal">
      <h3>Edit contraction</h3>
      <div class="field">
        <label for="editTime">Start time</label>
        <input type="time" id="editTime" step="60">
      </div>
      <div class="field">
        <label for="editDur">Duration (m:ss or seconds)</label>
        <input type="text" id="editDur" inputmode="numeric" placeholder="1:05">
      </div>
      <div class="field">
        <label for="editNote">Note (optional)</label>
        <input type="text" id="editNote" maxlength="120" placeholder="e.g. water broke, very strong…">
      </div>
      <div class="err" id="editErr"></div>
      <div class="btns">
        <button id="editCancel">Cancel</button>
        <button class="primary" id="editSave">Save</button>
      </div>
    </div>
  </div>

<script>
  const STORAGE_KEY = 'contractionLog_v2';
  const ROOM_KEY = 'syncRoom_v1';
  const SYNC_URL = 'https://contraction-sync.davidsen908.workers.dev';
  const POLL_MS = 4000;

  let contractions = [];
  let active = null;
  let tick = null;
  let revision = 0;          // wall-clock ms of the last local mutation; higher revision wins
  let syncOk = null;         // null = unknown, true = synced, false = offline/error

  // ---- theme (per-device preference, not synced) ----
  const themeBtn = document.getElementById('themeBtn');
  function paintThemeBtn() {
    themeBtn.textContent = document.documentElement.dataset.theme === 'light' ? '🌙' : '☀️';
  }
  themeBtn.addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('ctTheme', next); } catch(e) {}
    paintThemeBtn();
  });

  // ---- average window (per-device preference, not synced): count of contractions or a time span ----
  const AVG_WINDOW_KEY = 'ctAvgWindow';
  let avgWindow = (function(){ try { return localStorage.getItem(AVG_WINDOW_KEY) || '5'; } catch(e) { return '5'; } })();
  const avgWindowSel = document.getElementById('avgWindowSel');
  avgWindowSel.value = avgWindow;
  avgWindowSel.addEventListener('change', () => {
    avgWindow = avgWindowSel.value;
    try { localStorage.setItem(AVG_WINDOW_KEY, avgWindow); } catch(e) {}
    render();
  });
  function windowLabel() {
    if (avgWindow.endsWith('m')) {
      const mins = parseInt(avgWindow, 10);
      return mins % 60 === 0 ? `last ${mins/60}h` : `last ${mins}m`;
    }
    return `last ${avgWindow}`;
  }
  // contractions used for gap averaging: time mode -> those within the span; count mode -> need N+1 to get N gaps
  function windowSetForGaps() {
    if (avgWindow.endsWith('m')) {
      const cutoff = Date.now() - parseInt(avgWindow, 10) * 60000;
      return contractions.filter(c => c.start >= cutoff);
    }
    return contractions.slice(-(parseInt(avgWindow, 10) + 1));
  }
  // contractions used for duration averaging
  function windowSetForDuration() {
    if (avgWindow.endsWith('m')) {
      const cutoff = Date.now() - parseInt(avgWindow, 10) * 60000;
      return contractions.filter(c => c.start >= cutoff);
    }
    return contractions.slice(-parseInt(avgWindow, 10));
  }
  paintThemeBtn();

  // ---- sync room: taken from #r=... in the shared link, then remembered per device ----
  const hashRoom = (location.hash.match(/r=([a-z0-9-]{8,64})/i) || [])[1];
  if (hashRoom) { try { localStorage.setItem(ROOM_KEY, hashRoom.toLowerCase()); } catch(e) {} }
  const room = hashRoom ? hashRoom.toLowerCase() : (localStorage.getItem(ROOM_KEY) || null);

  // ---- persistence ----
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ revision, contractions, active }));
    } catch(e) { /* private mode / full storage - ignore */ }
  }
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        revision = data.revision || 0;
        contractions = data.contractions || [];
        if (data.active && data.active.start) active = data.active;
        return;
      }
      // migrate v1 data (pre-sync version) if present
      const old = localStorage.getItem('contractionLog_v1');
      if (old) {
        const data = JSON.parse(old);
        contractions = data.contractions || [];
        if (data.active && data.active.start) active = data.active;
        if (contractions.length || active) revision = Date.now();
        save();
      }
    } catch(e) { contractions = []; }
  }

  // ---- cross-device sync (last write wins by revision) ----
  function setSyncNote(state) {
    const el = document.getElementById('syncNote');
    if (!room) {
      el.className = 'saved-note';
      el.textContent = 'Saved to this device only — open the shared sync link to share the log.';
    } else if (state === true) {
      el.className = 'saved-note ok';
      el.textContent = 'Synced across devices ✓';
    } else if (state === false) {
      el.className = 'saved-note warn';
      el.textContent = 'Offline — saved on this device, will sync when connection returns.';
    } else {
      el.className = 'saved-note';
      el.textContent = 'Connecting to sync…';
    }
  }

  function pushState() {
    if (!room) return;
    fetch(`${SYNC_URL}/state/${room}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ revision, contractions, active }),
    })
      .then(r => { syncOk = r.ok; setSyncNote(syncOk); })
      .catch(() => { syncOk = false; setSyncNote(false); });
  }

  function applyRemote(remote) {
    revision = remote.revision;
    contractions = remote.contractions || [];
    active = (remote.active && remote.active.start) ? remote.active : null;
    save();
    updateMainUI();
    render();
  }

  async function pull() {
    if (!room) return;
    try {
      const res = await fetch(`${SYNC_URL}/state/${room}`, { cache: 'no-store' });
      if (!res.ok) throw 0;
      const remote = await res.json();
      syncOk = true; setSyncNote(true);
      if (remote && remote.revision > revision) applyRemote(remote);
      else if (!remote || remote.revision < revision) pushState(); // we're ahead (e.g. logged while offline)
    } catch(e) {
      syncOk = false; setSyncNote(false);
    }
  }

  // called after every local mutation
  function touch() {
    revision = Date.now();
    save();
    pushState();
  }

  const mainBtn = document.getElementById('mainBtn');
  const runningTimer = document.getElementById('runningTimer');
  const logList = document.getElementById('logList');
  const statusEl = document.getElementById('status');

  function fmtDur(ms) {
    const s = Math.round(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m > 0 ? `${m}:${sec.toString().padStart(2,'0')}` : `${sec}s`;
  }
  function fmtGap(ms) {
    const s = Math.round(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    if (m === 0) return `${sec}s`;
    return `${m}m ${sec}s`;
  }
  function fmtClock(ts) {
    return new Date(ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  }
  function esc(s) {
    return s.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  // ---- edit (modal) / delete rows ----
  const editOverlay = document.getElementById('editOverlay');
  const editTime = document.getElementById('editTime');
  const editDur = document.getElementById('editDur');
  const editNote = document.getElementById('editNote');
  const editErr = document.getElementById('editErr');
  let editIdx = null;

  function editRow(i) {
    const c = contractions[i];
    if (!c) return;
    editIdx = i;
    const d = new Date(c.start);
    editTime.value = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    editDur.value = fmtDur(c.duration);
    editNote.value = c.note || '';
    editErr.style.display = 'none';
    editOverlay.classList.add('open');
  }
  function closeEdit() {
    editOverlay.classList.remove('open');
    editIdx = null;
  }
  function showEditErr(msg) {
    editErr.textContent = msg;
    editErr.style.display = 'block';
  }
  document.getElementById('editCancel').addEventListener('click', closeEdit);
  editOverlay.addEventListener('click', (e) => { if (e.target === editOverlay) closeEdit(); });
  document.getElementById('editSave').addEventListener('click', () => {
    const c = contractions[editIdx];
    if (!c) { closeEdit(); return; }
    const tm = editTime.value.trim().match(/^(\d{1,2})[:.](\d{2})$/);
    if (!tm || +tm[1] > 23 || +tm[2] > 59) { showEditErr('Start time must be HH:MM, e.g. 14:35'); return; }
    let durMs;
    const durStr = editDur.value.trim();
    const dm = durStr.match(/^(\d+)[:.](\d{1,2})$/);
    if (dm) durMs = (+dm[1] * 60 + +dm[2]) * 1000;
    else if (/^\d+s?$/.test(durStr)) durMs = parseInt(durStr, 10) * 1000;
    else { showEditErr('Duration must be m:ss or seconds, e.g. 1:05 or 45'); return; }
    if (durMs <= 0 || durMs > 30*60000) { showEditErr('Duration must be between 1s and 30 min'); return; }
    const d = new Date(c.start);
    d.setHours(+tm[1], +tm[2], d.getSeconds(), 0);
    c.start = d.getTime();
    c.duration = durMs;
    c.end = c.start + durMs;
    const note = editNote.value.trim();
    if (note) c.note = note; else delete c.note;
    contractions.sort((a,b) => a.start - b.start);
    touch();
    render();
    closeEdit();
  });
  function deleteRow(i) {
    const c = contractions[i];
    if (!c) return;
    if (!confirm(`Delete the ${fmtClock(c.start)} contraction (${fmtDur(c.duration)})?`)) return;
    contractions.splice(i, 1);
    touch();
    render();
  }

  function render() {
    const n = contractions.length;
    document.getElementById('total').textContent = n;

    const wl = windowLabel();
    document.getElementById('avgFreqLabel').textContent = `Avg frequency (${wl})`;
    document.getElementById('avgDurLabel').textContent = `Avg duration (${wl})`;

    document.getElementById('lastGap').textContent = n >= 2 ? fmtGap(contractions[n-1].start - contractions[n-2].start) : '—';

    const durSet = windowSetForDuration();
    const avgD = durSet.length ? durSet.reduce((a,b)=>a+b.duration,0)/durSet.length : null;
    document.getElementById('avgDur').textContent = avgD !== null ? fmtDur(avgD) : '—';

    const gapSet = windowSetForGaps();
    if (gapSet.length >= 2) {
      const gaps = [];
      for (let i = 1; i < gapSet.length; i++) gaps.push(gapSet[i].start - gapSet[i-1].start);
      const avgGap = gaps.reduce((a,b)=>a+b,0)/gaps.length;
      document.getElementById('avgFreq').textContent = fmtGap(avgGap);
      updateStatus(avgGap, avgD);
    } else {
      document.getElementById('avgFreq').textContent = '—';
      statusEl.className = 'status';
      if (n === 0) statusEl.textContent = 'Waiting for first contraction';
      else if (n === 1) statusEl.textContent = 'First contraction logged — keep tracking';
      else statusEl.textContent = 'Not enough contractions in this window yet';
    }

    if (n === 0) {
      logList.innerHTML = '<li class="empty">No contractions yet.</li>';
      return;
    }
    logList.innerHTML = '';
    for (let i = contractions.length - 1; i >= 0; i--) {
      const c = contractions[i];
      const li = document.createElement('li');
      let gapTxt = '';
      if (i > 0) gapTxt = fmtGap(c.start - contractions[i-1].start);
      li.innerHTML = `<span class="time">${fmtClock(c.start)}</span>
                      <span class="dur">${fmtDur(c.duration)}</span>
                      <span class="gap">${gapTxt}</span>
                      <span class="rowacts">
                        <button class="rowbtn" data-edit="${i}" aria-label="Edit">✎</button>
                        <button class="rowbtn" data-del="${i}" aria-label="Delete">✕</button>
                      </span>${c.note ? `<span class="note">${esc(c.note)}</span>` : ''}`;
      logList.appendChild(li);
    }
  }

  logList.addEventListener('click', (e) => {
    const btn = e.target.closest('.rowbtn');
    if (!btn) return;
    if (btn.dataset.edit !== undefined) editRow(+btn.dataset.edit);
    else if (btn.dataset.del !== undefined) deleteRow(+btn.dataset.del);
  });

  function updateStatus(avgGap, avgDurMs) {
    const mins = avgGap / 60000;
    const avgD = avgDurMs !== null ? avgDurMs / 60000 : 0;
    statusEl.className = 'status';
    if (mins <= 5 && avgD >= 0.9) {
      statusEl.className = 'status go';
      statusEl.textContent = '5-1-1 reached — call fødetelefon 51 80 42 01';
    } else if (mins <= 8) {
      statusEl.className = 'status soon';
      statusEl.textContent = 'Getting closer — keep tracking, prep to go';
    } else {
      statusEl.textContent = 'Early labour — rest, hydrate, conserve energy';
    }
  }

  function startTick() {
    tick = setInterval(() => {
      runningTimer.textContent = fmtDur(Date.now() - active.start);
    }, 250);
  }

  // single place that makes the button/timer reflect `active` (local taps AND remote sync)
  function updateMainUI() {
    if (active) {
      mainBtn.textContent = 'Stop contraction';
      mainBtn.className = 'bigbtn stop';
      runningTimer.classList.remove('hidden');
      if (!tick) startTick();
    } else {
      if (tick) { clearInterval(tick); tick = null; }
      mainBtn.textContent = 'Start contraction';
      mainBtn.className = 'bigbtn start';
      runningTimer.classList.add('hidden');
      runningTimer.textContent = '0:00';
    }
  }

  mainBtn.addEventListener('click', () => {
    if (!active) {
      active = { start: Date.now() };
      updateMainUI();
      touch();
    } else {
      active.end = Date.now();
      active.duration = active.end - active.start;
      contractions.push(active);
      active = null;
      updateMainUI();
      render();
      touch();
    }
  });

  document.getElementById('undoBtn').addEventListener('click', () => {
    if (active) {
      active = null;
      updateMainUI();
    } else if (contractions.length) {
      contractions.pop();
      render();
    }
    touch();
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Clear the whole log?')) {
      contractions = [];
      active = null;
      updateMainUI();
      render();
      touch();
    }
  });

  // ---- init: restore state, then sync ----
  load();
  updateMainUI();
  render();
  setSyncNote(syncOk);
  pull();
  setInterval(pull, POLL_MS);
  setInterval(() => { if (avgWindow.endsWith('m')) render(); }, 15000); // keep time-based windows current as contractions age out
  document.addEventListener('visibilitychange', () => { if (!document.hidden) pull(); });
  window.addEventListener('online', pull);
</script>
</body>
</html>
